name: Build ExaminerAI Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Install dependencies
        run: bun install

      - name: Download Ollama binary
        shell: powershell
        run: |
          $url = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          $output = "src-tauri/binaries/ollama-windows-amd64.zip"
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $output
          Expand-Archive -Path $output -DestinationPath "src-tauri/binaries" -Force
          Remove-Item $output
          Move-Item -Path "src-tauri/binaries/ollama.exe" -Destination "src-tauri/binaries/ollama-x86_64-pc-windows-msvc.exe" -Force

      - name: Build Tauri app
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ExaminerAI-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
