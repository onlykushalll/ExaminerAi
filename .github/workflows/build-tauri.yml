name: Build ExaminerAI Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      - name: Download Ollama binary
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
          $output = "src-tauri/binaries/ollama-windows-amd64.zip"
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          curl.exe -L -o $output $url
          Expand-Archive -Path $output -DestinationPath "src-tauri/binaries" -Force
          Remove-Item $output
          Move-Item -Path "src-tauri/binaries/ollama.exe" -Destination "src-tauri/binaries/ollama-x86_64-pc-windows-msvc.exe" -Force

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create Self-Signed Certificate and Sign Binary
        shell: powershell
        run: |
          Write-Host "Generating self-signed certificate..."
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ExaminerAI Local Dev" -FriendlyName "ExaminerAI Self-Signed Cert" -NotAfter (Get-Date).AddYears(5) -CertStoreLocation Cert:\LocalMachine\My
          
          Write-Host "Exporting certificate..."
          Export-Certificate -Cert $cert -FilePath "src-tauri/target/release/bundle/nsis/ExaminerAI-SelfSigned.cer"
          
          $thumbprint = $cert.Thumbprint
          Write-Host "Certificate Thumbprint: $thumbprint"
          
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter signtool.exe -Recurse | Select-Object -First 1).FullName
          if (-not $signtool) {
              Write-Error "signtool.exe not found"
              exit 1
          }
          Write-Host "Found signtool: $signtool"
          
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | ForEach-Object {
              Write-Host "Signing $_..."
              & $signtool sign /sm /sha1 $thumbprint /fd SHA256 /t http://timestamp.digicert.com $_.FullName
          }
          Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | ForEach-Object {
              Write-Host "Signing $_..."
              & $signtool sign /sm /sha1 $thumbprint /fd SHA256 /t http://timestamp.digicert.com $_.FullName
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ExaminerAI-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.cer
            src-tauri/target/release/bundle/msi/*.msi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.cer
            src-tauri/target/release/bundle/msi/*.msi
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
